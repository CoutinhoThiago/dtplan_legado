# Porta do servidor
server.port=8081

# Banco MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/dtplan_db?createDatabaseIfNotExist=true&autoReconnect=true&useSSL=false&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=usuario_prod
spring.datasource.password=senha_forte

# Configurações específicas para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8InnoDBDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Otimizações para produção
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=false

# Segurança do H2 em produção
spring.h2.console.enabled=false