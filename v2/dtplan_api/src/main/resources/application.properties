# =====================================================================
# Configuraþ§es Gerais da AplicaþÒo
# =====================================================================
spring.application.name=dtplan
java.runtime.version=17
server.port=8081

# =====================================================================
# Configuraþ§es de Perfil
# =====================================================================
spring.profiles.active=dev

# =====================================================================
# Configuraþ§es do Spring Data JPA (ORM)
# =====================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.generate-ddl=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# EstratÚgias de nomenclatura para manter camelCase
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Dialeto do Hibernate para MySQL 8 (compatÝvel com H2 em dev)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =====================================================================
# Configuraþ§es de Seguranþa
# =====================================================================
api.security.token.secret=12345678

# =====================================================================
# Configuraþ§es do Flyway (Gerenciamento de Migraþ§es de Banco)
# =====================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# =====================================================================
# Configuraþ§es Comuns de Banco de Dados
# =====================================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Configuraþ§es padrÒo (serÒo sobrescritas pelo perfil ativo)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# =====================================================================
# Configuraþ§es de Logging (Opcional)
# =====================================================================
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.flywaydb=DEBUG

# =====================================================================
# Configuraþ§es do Spring Boot Actuator (Monitoramento)
# =====================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.enable.hikaricp=true

# Desativar inicializaþÒo de dados SQL
spring.sql.init.mode=never

# =====================================================================
# Configuraþ§es EspecÝficas para Desenvolvimento (dev)
# =====================================================================
# Ativadas quando o perfil 'dev' estiver ativo
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================================================================
# Configuraþ§es EspecÝficas para ProduþÒo (prod)
# =====================================================================
# Ativadas quando o perfil 'prod' estiver ativo
# (Estas propriedades devem estar no application-prod.properties)