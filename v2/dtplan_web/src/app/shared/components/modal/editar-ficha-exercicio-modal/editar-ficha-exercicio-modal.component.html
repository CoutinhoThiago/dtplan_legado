<div class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Editar Exercício</h2>
      <button class="modal-close-button" (click)="fecharModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form class="modal-form">
        <label for="carga">Carga (kg)</label>
        <input type="number" id="carga" [(ngModel)]="fichaExercicio.carga" name="carga" required>

        <label for="duracao">Duração (minutos)</label>
        <input type="number" id="duracao" [(ngModel)]="fichaExercicio.duracao_minutos" name="duracao" required>

        <label for="intensidade">Intensidade</label>
        <input type="text" id="intensidade" [(ngModel)]="fichaExercicio.intensidade" name="intensidade" required>

        <label for="series">Séries</label>
        <input type="number" id="series" [(ngModel)]="fichaExercicio.series" name="series" required>
      </form>
    </div>
    <div class="modal-footer">
      <button class="modal-button secondary" (click)="fecharModal()">Cancelar</button>
      <button class="modal-button primary" (click)="salvarEdicao()">Salvar</button>
    </div>
  </div>
</div>
