<p>criar-ficha-exercicio-modal works!</p>
<div class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Editar Exercício</h2>
        <button class="modal-close-button" (click)="fecharModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form class="modal-form">
            <label for="exercicio">Exercicio</label>
            <div class="form-group">
                <label for="exercicio">Exercício:</label>
                <select id="exercicio" (change)="onExercicioSelect($event)">
                  <option value="">Selecione um exercício</option>
                  @for (exercicio of exercicios; track exercicio.id) {
                    <option [value]="exercicio.id">{{ exercicio.nome }}</option>
                  }
                </select>
              </div>

          <label for="carga">Carga (kg)</label>
          <input type="number" id="carga" [(ngModel)]="cadastrarFichaExercicio.carga" name="carga" required>
  
          <label for="duracao">Duração (minutos)</label>
          <input type="number" id="duracao" [(ngModel)]="cadastrarFichaExercicio.duracao_minutos" name="duracao" required>
  
          <label for="intensidade">Intensidade</label>
          <input type="text" id="intensidade" [(ngModel)]="cadastrarFichaExercicio.intensidade" name="intensidade" required>
  
          <label for="series">Séries</label>
          <input type="number" id="series" [(ngModel)]="cadastrarFichaExercicio.series" name="series" required>
        </form>
      </div>
      <div class="modal-footer">
        <button class="modal-button secondary" (click)="fecharModal()">Cancelar</button>
        <button class="modal-button primary" (click)="salvarCadastro()">Salvar</button>
      </div>
    </div>
  </div>
